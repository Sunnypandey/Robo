<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Universal AI PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
html, body { height:100%; }
.sidebar-transition { transition: transform .3s ease; }
pre { position:relative; }
.copy-btn {
 position:absolute;
 top:5px;
 right:5px;
 background:black;
 color:white;
 font-size:12px;
 padding:2px 6px;
 border-radius:4px;
 cursor:pointer;
}
</style>
</head>

<body class="bg-gray-100 text-gray-900">

<div id="loading" class="flex items-center justify-center min-h-screen text-lg">
Loading App...
</div>

<div id="app" class="hidden min-h-screen flex">

<!-- Sidebar -->
<div id="sidebar"
class="fixed md:relative z-30 w-64 bg-white border-r border-gray-200 min-h-screen flex flex-col sidebar-transition -translate-x-full md:translate-x-0">

<div class="p-4 border-b flex justify-between items-center">
<button id="newChatBtn" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">New Chat</button>
<button id="closeSidebar" class="md:hidden">✕</button>
</div>

<div id="chatList" class="flex-1 overflow-y-auto p-2 space-y-1"></div>

<div class="p-2 border-t text-sm space-y-2">
<button id="settingsBtn" class="w-full text-left px-2 py-1 hover:bg-gray-100 rounded">⚙ Settings</button>
<button id="exportBtn" class="w-full text-left px-2 py-1 hover:bg-gray-100 rounded">⬇ Export</button>
<button id="importBtn" class="w-full text-left px-2 py-1 hover:bg-gray-100 rounded">⬆ Import</button>
<button id="themeToggle" class="w-full text-left px-2 py-1 hover:bg-gray-100 rounded">🌙 Dark Mode</button>
</div>
</div>

<div id="overlay" class="hidden fixed inset-0 bg-black/40 z-20 md:hidden"></div>

<!-- Main -->
<div class="flex-1 flex flex-col min-h-screen">

<div class="flex items-center justify-between p-3 border-b bg-white">
<button id="openSidebar" class="md:hidden text-xl">☰</button>
<h1 class="text-lg font-semibold">Universal AI PRO</h1>

<select id="modeSelect" class="border px-2 py-1 text-sm rounded">
<option value="">Default</option>
<option value="coding">Coding</option>
<option value="trading">Trading</option>
<option value="content">Content Creator</option>
</select>
</div>

<div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4 pb-32"></div>

<div class="fixed bottom-0 left-0 right-0 md:left-64 bg-white border-t p-3">
<div class="flex gap-2">
<textarea id="userInput" rows="1"
class="flex-1 resize-none border rounded px-3 py-2 focus:outline-none"></textarea>

<button id="voiceBtn" class="bg-gray-200 px-3 rounded">🎤</button>
<button id="stopBtn" class="bg-red-500 text-white px-3 rounded hidden">Stop</button>
<button id="sendBtn" class="bg-blue-500 text-white px-4 rounded">Send</button>
</div>
</div>

</div>
</div>

<script>
(function(){

document.getElementById("loading").style.display="none";
document.getElementById("app").classList.remove("hidden");

let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let currentChatId = localStorage.getItem("currentChatId");
let apiKey = localStorage.getItem("openrouter_api_key") || "";
let model = localStorage.getItem("openrouter_model") || "deepseek/deepseek-r1:free";
let controller = null;

function saveState(){
localStorage.setItem("chats", JSON.stringify(chats));
localStorage.setItem("currentChatId", currentChatId);
}

function getCurrentChat(){
return chats.find(c=>c.id===currentChatId);
}

function createChat(){
const id = Date.now().toString();
const chat = { id, title:"New Chat", messages:[] };
chats.unshift(chat);
currentChatId=id;
saveState();
renderChatList();
renderMessages();
}

function renderChatList(){
const list=document.getElementById("chatList");
list.innerHTML="";
chats.forEach(chat=>{
const div=document.createElement("div");
div.className="px-2 py-1 hover:bg-gray-100 rounded cursor-pointer";
div.innerText=chat.title;
div.onclick=()=>{currentChatId=chat.id;saveState();renderMessages();};
list.appendChild(div);
});
}

function renderMessages(){
const container=document.getElementById("messages");
container.innerHTML="";
const chat=getCurrentChat();
if(!chat) return;

chat.messages.forEach(msg=>{
const wrap=document.createElement("div");
wrap.className=msg.role==="user"?"text-right":"text-left";

const bubble=document.createElement("div");
bubble.className=msg.role==="user"
?"inline-block bg-blue-500 text-white px-3 py-2 rounded-lg"
:"inline-block bg-gray-200 px-3 py-2 rounded-lg";

bubble.innerHTML=marked.parse(msg.content||"");
wrap.appendChild(bubble);
container.appendChild(wrap);
});

container.scrollTop=container.scrollHeight;
addCopyButtons();
}

function addCopyButtons(){
document.querySelectorAll("pre").forEach(pre=>{
if(pre.querySelector(".copy-btn")) return;
const btn=document.createElement("div");
btn.className="copy-btn";
btn.innerText="Copy";
btn.onclick=()=>navigator.clipboard.writeText(pre.innerText);
pre.appendChild(btn);
});
}

async function sendMessage(){
const input=document.getElementById("userInput");
const text=input.value.trim();
if(!text) return;
if(!apiKey) return alert("Add API key in settings");

const chat=getCurrentChat();
chat.messages.push({role:"user",content:text});
input.value="";
renderMessages();

const aiMsg={role:"assistant",content:""};
chat.messages.push(aiMsg);
renderMessages();

controller = new AbortController();
document.getElementById("stopBtn").classList.remove("hidden");

try{
const response=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model,
stream:true,
messages:chat.messages
}),
signal: controller.signal
});

const reader=response.body.getReader();
const decoder=new TextDecoder();

while(true){
const {done,value}=await reader.read();
if(done) break;
const chunk=decoder.decode(value);
chunk.split("\n").forEach(line=>{
if(line.startsWith("data: ")){
const data=line.replace("data: ","");
if(data==="[DONE]") return;
try{
const json=JSON.parse(data);
const token=json.choices?.[0]?.delta?.content;
if(token){
aiMsg.content+=token;
renderMessages();
}
}catch{}
}
});
}

saveState();
}catch(e){
aiMsg.content="Error: "+e.message;
renderMessages();
}

document.getElementById("stopBtn").classList.add("hidden");
}

document.getElementById("sendBtn").onclick=sendMessage;
document.getElementById("stopBtn").onclick=()=>{ if(controller) controller.abort(); };

document.getElementById("voiceBtn").onclick=function(){
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SpeechRecognition) return alert("Voice not supported");
const recognition=new SpeechRecognition();
recognition.lang="en-IN";
recognition.start();
recognition.onresult=function(e){
document.getElementById("userInput").value=e.results[0][0].transcript;
};
};

document.getElementById("exportBtn").onclick=function(){
const data=JSON.stringify(chats);
const blob=new Blob([data],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="chat-backup.json";
a.click();
};

document.getElementById("importBtn").onclick=function(){
const input=document.createElement("input");
input.type="file";
input.onchange=function(e){
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=function(){
chats=JSON.parse(reader.result);
saveState();
renderChatList();
renderMessages();
};
reader.readAsText(file);
};
input.click();
};

document.getElementById("themeToggle").onclick=function(){
document.body.classList.toggle("bg-gray-900");
document.body.classList.toggle("text-white");
};

document.getElementById("openSidebar").onclick=function(){
document.getElementById("sidebar").classList.remove("-translate-x-full");
document.getElementById("overlay").classList.remove("hidden");
};
document.getElementById("closeSidebar").onclick=closeSidebar;
document.getElementById("overlay").onclick=closeSidebar;
function closeSidebar(){
document.getElementById("sidebar").classList.add("-translate-x-full");
document.getElementById("overlay").classList.add("hidden");
}

if(!currentChatId) createChat();
renderChatList();
renderMessages();

})();
</script>

</body>
</html>

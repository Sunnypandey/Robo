<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPTRON ULTRA AI</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:linear-gradient(135deg,#0f0f0f,#1a1a2e,#16213e);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.chat-container{
  width:95%;
  max-width:900px;
  height:90vh;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header{
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  background:rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

.message{
  padding:10px 14px;
  border-radius:15px;
  margin-bottom:10px;
  max-width:80%;
}

.user{
  background:#00adb5;
  align-self:flex-end;
}

.bot{
  background:#222831;
  align-self:flex-start;
}

.input-area{
  display:flex;
  padding:10px;
  gap:10px;
  background:rgba(255,255,255,0.05);
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e1e1e;
  color:white;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00adb5;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#007a80;
}

/* Settings Panel */
#settingsPanel{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:15px;
  z-index:1000;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">
    <span>SPTRON ULTRA AI 🚀</span>
    <button onclick="openSettings()">⚙</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask anything...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- Settings -->
<div id="settingsPanel">
  <h3>Settings</h3>
  <label>Select Model:</label>
  <select id="modelSelect">
    <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
    <option value="mistralai/mistral-7b-instruct">Mistral 7B</option>
  </select>
  <br><br>
  <button onclick="closeSettings()">Close</button>
</div>

<script>

const API_KEY = "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";

async function sendMessage() {
  const input = document.getElementById("userInput");
  const message = input.value;
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  addMessage("Typing...", "bot");

  const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: document.getElementById("modelSelect").value,
      messages: [{ role: "user", content: message }]
    })
  });

  const data = await response.json();

  document.querySelector(".bot:last-child").remove();

  if(data.choices){
    addMessage(data.choices[0].message.content, "bot");
  } else {
    addMessage("Error: Check API Key or Credits", "bot");
  }
}

function addMessage(text, sender){
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerText = text;
  document.getElementById("messages").appendChild(msg);
  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
}

function openSettings(){
  document.getElementById("settingsPanel").style.display = "block";
}

function closeSettings(){
  document.getElementById("settingsPanel").style.display = "none";
}

</script>

</body>
</html>
